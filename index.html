<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIFEPLUS Collection Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#0F172A; --navy-light:#1E293B; --slate-800:#1E293B; --slate-700:#334155;
  --slate-600:#475569; --slate-500:#64748B; --slate-400:#94A3B8; --slate-300:#CBD5E1;
  --slate-200:#E2E8F0; --slate-100:#F1F5F9; --slate-50:#F8FAFC;
  --blue:#3B82F6; --blue-light:#60A5FA; --cyan:#06B6D4; --violet:#8B5CF6;
  --amber:#F59E0B; --green:#10B981; --orange:#F97316; --red:#EF4444; --rose:#F43F5E;
  --sidebar-w:240px; --radius:12px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#F0F2F7;color:var(--slate-800);line-height:1.5}
::selection{background:var(--blue);color:#fff}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--slate-300);border-radius:3px}

.sidebar{position:fixed;left:0;top:0;width:var(--sidebar-w);height:100vh;background:var(--navy);z-index:100;overflow-y:auto;display:flex;flex-direction:column}
.sb-logo{padding:24px 24px 20px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-logo .brand{font-size:18px;font-weight:800;color:#fff;letter-spacing:.5px}
.sb-logo .sub{font-size:11px;color:var(--slate-500);margin-top:2px}
.sb-nav{padding:12px 0;flex:1}
.sb-section{padding:0 16px;margin-bottom:4px}
.sb-section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--slate-500);padding:12px 8px 6px}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 12px;color:var(--slate-400);font-size:13px;font-weight:500;cursor:pointer;border-radius:8px;margin-bottom:1px;transition:all .15s;user-select:none}
.sb-item:hover{background:rgba(255,255,255,.05);color:var(--slate-300)}
.sb-item.active{background:rgba(59,130,246,.15);color:#fff}
.sb-item .icon{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.sb-item .cnt{margin-left:auto;background:rgba(255,255,255,.08);padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600}
.sb-footer{padding:16px 24px;border-top:1px solid rgba(255,255,255,.06)}
.sb-footer .ver{font-size:10px;color:var(--slate-500)}

.main{margin-left:var(--sidebar-w);min-height:100vh}
.topbar{background:#fff;padding:14px 36px;display:flex;align-items:center;gap:16px;border-bottom:1px solid var(--slate-200);position:sticky;top:0;z-index:50}
.topbar h1{font-size:18px;font-weight:700;color:var(--navy)}
.topbar .badge{display:inline-flex;align-items:center;gap:6px;background:#ECFDF5;color:#059669;font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px}
.topbar .badge::before{content:'';width:6px;height:6px;border-radius:50%;background:#10B981;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.month-sel{margin-left:auto;padding:7px 14px;border:1px solid var(--slate-200);border-radius:8px;font-size:13px;font-weight:500;background:#fff;cursor:pointer;font-family:inherit;color:var(--slate-700)}

.page{display:none;padding:28px 36px 60px}.page.show{display:block}
.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--blue);font-size:13px;font-weight:500;cursor:pointer;margin-bottom:20px;border:none;background:none;font-family:inherit}
.back-btn:hover{text-decoration:underline}
.page-title{font-size:24px;font-weight:800;color:var(--navy);margin-bottom:6px;display:flex;align-items:center;gap:12px}
.page-title .badge-count{font-size:14px;font-weight:600;padding:4px 12px;border-radius:20px;background:var(--slate-100);color:var(--slate-600)}
.page-subtitle{font-size:14px;color:var(--slate-500);margin-bottom:24px}

/* Metrics */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.metric-card{background:#fff;border-radius:var(--radius);padding:20px;border:1px solid var(--slate-100);position:relative;overflow:hidden}
.metric-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.metric-card:nth-child(1)::after{background:var(--green)}.metric-card:nth-child(2)::after{background:var(--blue)}
.metric-card:nth-child(3)::after{background:var(--amber)}.metric-card:nth-child(4)::after{background:var(--violet)}
.metric-card .m-label{font-size:12px;font-weight:500;color:var(--slate-400);text-transform:uppercase;letter-spacing:.5px}
.metric-card .m-value{font-size:28px;font-weight:800;color:var(--navy);margin:4px 0 2px}
.metric-card .m-sub{font-size:12px;color:var(--slate-400)}

/* Cat grid */
.sec-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.sec-header h2{font-size:16px;font-weight:700;color:var(--navy)}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px}
.cat-card{background:#fff;border-radius:var(--radius);overflow:hidden;cursor:pointer;border:1px solid var(--slate-100);transition:all .2s}
.cat-card:hover{box-shadow:0 8px 30px rgba(0,0,0,.08);transform:translateY(-3px);border-color:transparent}
.cat-card .cc-bar{height:3px}.cat-card .cc-body{padding:20px}
.cat-card .cc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.cat-card .cc-title{font-size:15px;font-weight:700}
.cat-card .cc-cnt{font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px}
.cat-card .cc-list{list-style:none}
.cat-card .cc-list li{padding:7px 0;border-bottom:1px solid var(--slate-100);font-size:13px;display:flex;justify-content:space-between;align-items:center}
.cat-card .cc-list li:last-child{border-bottom:none}
.cat-card .cc-list .it{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-right:8px;font-weight:500}
.cat-card .cc-list .dt{color:var(--slate-400);font-size:11px;flex-shrink:0}
.cat-card .cc-more{display:block;text-align:center;padding-top:10px;color:var(--slate-400);font-size:12px;font-weight:500}

/* Home sections */
.home-section{background:#fff;border-radius:var(--radius);padding:20px 24px;border:1px solid var(--slate-100);margin-bottom:20px;cursor:pointer;transition:all .2s}
.home-section:hover{box-shadow:0 4px 16px rgba(0,0,0,.05)}
.home-section .hs-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.home-section .hs-head h3{font-size:15px;font-weight:700;color:var(--navy)}
.home-section .hs-head .hs-link{font-size:12px;color:var(--blue);font-weight:500}
.kw-tags{display:flex;flex-wrap:wrap;gap:8px}
.kw-tag{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;transition:all .15s}
.kw-tag:hover{transform:translateY(-1px)}
.kw-tag.purple{background:#F5F3FF;color:#7C3AED}

/* Top preview */
.top-preview{width:100%}.top-preview tr{border-bottom:1px solid var(--slate-100)}.top-preview tr:last-child{border-bottom:none}
.top-preview td{padding:10px 4px;font-size:13px;vertical-align:middle}
.top-preview .rank{width:32px;font-weight:800;color:var(--amber);font-size:15px}
.top-preview .tp-title{font-weight:600}.top-preview .tp-cat{color:var(--slate-400);font-size:12px}
.top-preview .tp-score{text-align:right;font-weight:700;color:var(--blue);font-size:14px}


/* View toggle */
.view-toggle{display:flex;gap:4px;margin-left:auto}
.view-btn{width:34px;height:34px;border:1px solid var(--slate-200);background:#fff;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--slate-400);transition:all .15s}
.view-btn:hover{border-color:var(--blue);color:var(--blue)}
.view-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}

/* List view */
.card-list.list-view{grid-template-columns:1fr;gap:10px}
.card-list.list-view .cl-card{flex-direction:row;align-items:center}
.card-list.list-view .cl-poster{aspect-ratio:auto;width:80px;height:110px;flex-shrink:0;border-radius:8px}
.card-list.list-view .cl-info{padding:12px 16px}
.card-list.list-view .cl-info h4{font-size:14px}
.score-badge.list-only{display:none}
.card-list.list-view .score-badge.grid-only{display:none}
.card-list.list-view .score-badge.list-only{display:inline-block;position:static;font-size:11px;padding:3px 8px;border-radius:6px;background:rgba(15,23,42,.75);color:#fff;font-weight:700;margin-bottom:4px;backdrop-filter:none;width:fit-content;align-self:flex-start}
.card-list.list-view .cl-poster .type-badge{font-size:9px;padding:2px 6px;top:6px;left:6px}


.card-list.list-view .cl-desc{font-size:12px;color:var(--slate-400);margin-top:4px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.card-list:not(.list-view) .cl-desc{display:none}
/* Filter bar */
.filter-bar{display:flex;gap:8px;margin-bottom:20px;align-items:center;flex-wrap:wrap}
.filter-btn{padding:6px 16px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--slate-200);background:#fff;cursor:pointer;font-family:inherit;color:var(--slate-500);transition:all .15s}
.filter-btn:hover{border-color:var(--blue);color:var(--blue)}
.filter-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.filter-label{font-size:12px;color:var(--slate-400);font-weight:500;margin-right:4px}

/* Card list */
.card-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.cl-card{background:#fff;border-radius:var(--radius);overflow:hidden;cursor:pointer;border:1px solid var(--slate-100);transition:all .2s;display:flex;flex-direction:column}
.cl-card:hover{box-shadow:0 8px 30px rgba(0,0,0,.1);transform:translateY(-2px);border-color:transparent}
.cl-poster{aspect-ratio:2/3;background:var(--slate-100);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.cl-poster img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.cl-card:hover .cl-poster img{transform:scale(1.05)}
.cl-poster .poster-placeholder{font-size:48px;color:var(--slate-300)}
.cl-poster .score-badge{position:absolute;top:12px;right:12px;padding:4px 10px;border-radius:8px;font-size:12px;font-weight:700;color:#fff;background:rgba(15,23,42,.75);backdrop-filter:blur(4px)}
.cl-poster .type-badge{position:absolute;top:12px;left:12px;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;color:#fff}
.cl-info{padding:16px;flex:1;display:flex;flex-direction:column}
.cl-info h4{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:4px;line-height:1.3}
.cl-info .cl-genre{font-size:12px;color:var(--slate-400);margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cl-info .cl-meta{font-size:12px;color:var(--slate-500);margin-top:auto;display:flex;gap:12px}
.cl-info .cl-scores{display:flex;gap:4px;margin-top:8px}

/* Score bars (mini) */
.score-bar-mini{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.score-bar-mini .sb-label{font-size:9px;color:var(--slate-400);font-weight:600}
.score-bar-mini .sb-track{width:100%;height:4px;background:var(--slate-100);border-radius:2px;overflow:hidden}
.score-bar-mini .sb-fill{height:100%;border-radius:2px;transition:width .3s}

/* KW page */
.kw-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.kw-card{background:#fff;border-radius:var(--radius);padding:20px;border:1px solid var(--slate-100);transition:all .2s}
.kw-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.06)}
.kw-card .kw-cat{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:3px 10px;border-radius:4px;display:inline-block;margin-bottom:10px}
.kw-card .kw-cat.seasonal{background:#FEF3C7;color:#D97706}
.kw-card .kw-cat.global{background:#DBEAFE;color:#2563EB}
.kw-card .kw-cat.content{background:#F3E8FF;color:#7C3AED}
.kw-card .kw-cat.culture{background:#FCE7F3;color:#DB2777}
.kw-card .kw-cat.marketing{background:#DCFCE7;color:#16A34A}
.kw-card .kw-name{font-size:18px;font-weight:700;color:var(--navy);margin-bottom:6px}
.kw-card .kw-context{font-size:13px;color:var(--slate-500);line-height:1.5}
.kw-card .kw-idea{font-size:12px;color:var(--slate-400);margin-top:8px;padding-top:8px;border-top:1px solid var(--slate-100)}

/* TOP page */
.top-list{display:flex;flex-direction:column;gap:12px}
.top-card{background:#fff;border-radius:var(--radius);padding:16px 20px;border:1px solid var(--slate-100);display:flex;align-items:center;gap:20px;cursor:pointer;transition:all .2s}
.top-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.06);transform:translateX(4px)}
.top-card .tc-rank{font-size:24px;font-weight:800;width:40px;text-align:center;flex-shrink:0}
.top-card .tc-rank.gold{color:#D97706}.tc-rank.silver{color:var(--slate-400)}.tc-rank.bronze{color:#CD7F32}.tc-rank.normal{color:var(--slate-300)}
.top-card .tc-poster{width:48px;height:68px;border-radius:6px;background:var(--slate-100);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.top-card .tc-poster img{width:100%;height:100%;object-fit:cover}
.top-card .tc-info{flex:1;min-width:0}
.top-card .tc-title{font-size:15px;font-weight:700;color:var(--navy)}
.top-card .tc-sub{font-size:12px;color:var(--slate-400);margin-top:2px}
.top-card .tc-scores-row{display:flex;gap:6px;margin-top:8px}
.top-card .tc-sc{font-size:11px;padding:3px 8px;border-radius:6px;font-weight:600;background:var(--slate-50)}
.top-card .tc-total{flex-shrink:0;margin-left:auto;text-align:center;min-width:72px}
.top-card .tc-total-label{font-size:9px;font-weight:600;color:var(--slate-400);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.top-card .tc-total-score{font-size:24px;font-weight:800;line-height:1}
.top-card .tc-total-max{font-size:10px;color:var(--slate-400);font-weight:500}
.top-card .tc-score-ring{width:56px;height:56px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto}

/* Detail overlay */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;backdrop-filter:blur(2px)}
.overlay.show{display:flex;justify-content:center;align-items:flex-start;padding-top:40px}
.dp{background:#fff;border-radius:16px;width:900px;max-height:88vh;overflow-y:auto;box-shadow:0 25px 60px rgba(0,0,0,.25);display:flex;flex-direction:column}
.dp-layout{display:flex;gap:0}
.dp-poster-side{width:400px;flex-shrink:0;background:var(--navy);border-radius:16px 0 0 16px;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center}
.dp-poster-side img{width:100%;height:100%;object-fit:cover}
.dp-poster-side .dp-poster-placeholder{display:flex;align-items:center;justify-content:center;width:100%;height:100%;min-height:400px;background:linear-gradient(135deg,var(--navy),var(--blue))}
.dp-content-side{flex:1;min-width:0;display:flex;flex-direction:column}
.dp-header{padding:20px 24px 12px;border-bottom:1px solid var(--slate-100)}
.dp-header .dp-cat-label{font-size:11px;color:var(--slate-400);font-weight:600;margin-bottom:4px;letter-spacing:.5px}
.dp-header h2{font-size:22px;font-weight:800;color:var(--navy);line-height:1.3;margin-bottom:0}
.dp-close{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.4);border:none;color:#fff;font-size:18px;cursor:pointer;backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:10}
.dp-close:hover{background:rgba(255,255,255,.25)}
.dp-meta-row{display:flex;flex-wrap:wrap;gap:6px;padding:12px 24px;border-bottom:1px solid var(--slate-100)}
.dp-meta-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;background:var(--slate-50);color:var(--slate-600)}
.dp-body{padding:16px 24px 24px;overflow-y:auto;flex:1}
@media(max-width:700px){.dp{width:95vw}.dp-layout{flex-direction:column}.dp-poster-side{width:100%;height:200px;border-radius:16px 16px 0 0}}

/* Detail: Description & AI reason FIRST */
.dp-desc{font-size:14px;line-height:1.8;color:var(--slate-600);margin-bottom:16px}
.dp-reason{background:var(--slate-50);border-radius:10px;padding:14px 18px;font-size:13px;color:var(--slate-500);line-height:1.7;margin-bottom:20px;border-left:3px solid var(--blue)}
.dp-reason strong{color:var(--navy)}

/* Detail: Score section — side-by-side layout */
.dp-score-wrapper{display:flex;gap:20px;margin-bottom:20px;align-items:stretch}
.dp-score-section{flex:1;min-width:0}
.dp-score-section h3{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.dp-score-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.dp-score-row .sr-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.dp-score-row .sr-label{font-size:12px;font-weight:600;color:var(--slate-600);width:42px;flex-shrink:0}
.dp-score-row .sr-track{flex:1;height:8px;background:var(--slate-100);border-radius:4px;overflow:hidden}
.dp-score-row .sr-fill{height:100%;border-radius:4px;transition:width .5s}
.dp-score-row .sr-val{font-size:14px;font-weight:800;width:24px;text-align:right;flex-shrink:0}
.dp-total-panel{width:140px;flex-shrink:0;display:flex;align-items:center;justify-content:center;text-align:center;background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;border-radius:12px;padding:20px 16px}
.dp-total-panel .dtl{font-size:10px;font-weight:500;opacity:.7;text-transform:uppercase;letter-spacing:1px}
.dp-total-panel .dtv{font-size:40px;font-weight:800;margin:4px 0;line-height:1}.dp-total-panel .dts{font-size:11px;opacity:.6}
@media(max-width:600px){.dp-score-wrapper{flex-direction:column}.dp-total-panel{width:100%}}
.dp-tags{display:flex;flex-wrap:wrap;gap:6px}.dp-tag{background:#EFF6FF;color:var(--blue);padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500}
@media(max-width:1200px){.cat-grid{grid-template-columns:repeat(2,1fr)}.metrics{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="sidebar">
  <div class="sb-logo"><div class="brand">LIFEPLUS</div><div class="sub">Collection Agent</div></div>
  <div class="sb-nav" id="sideNav"></div>
  <div class="sb-footer"><div class="ver">v2.1 · Powered by Claude API</div></div>
</div>
<div class="main">
  <div class="topbar">
    <h1>Dashboard</h1>
    <span class="badge">Live Connected</span>
    <select class="month-sel" id="monthSel" onchange="changeMonth(this.value)">
      <option value="202606">2026년 6월</option>
      <option value="202607">2026년 7월</option>
    </select>
  </div>
  <div class="page show" id="homePage">
    <div class="metrics" id="metrics"></div>
    <div class="sec-header"><h2>카테고리별 수집 현황</h2></div>
    <div class="cat-grid" id="catGrid"></div>
    <div class="home-section" id="kwSection" onclick="navigate('keywords')"></div>
    <div class="home-section" id="topSection" onclick="navigate('top')"></div>
  </div>
  <div class="page" id="catPage">
    <button class="back-btn" onclick="navigate('dashboard')">← 대시보드</button>
    <div class="page-title" id="catPageTitle"></div>
    <div class="page-subtitle" id="catPageSub"></div>
    <div class="filter-bar" id="catFilter"></div>
    <div class="card-list" id="catCards"></div>
  </div>
  <div class="page" id="kwPage">
    <button class="back-btn" onclick="navigate('dashboard')">← 대시보드</button>
    <div class="page-title" id="kwPageTitle"></div>
    <div class="page-subtitle" id="kwPageSub"></div>
    <div class="filter-bar" id="kwFilter"></div>
    <div class="kw-grid" id="kwGrid"></div>
  </div>
  <div class="page" id="topPage">
    <button class="back-btn" onclick="navigate('dashboard')">← 대시보드</button>
    <div class="page-title" id="topPageTitle"></div>
    <div class="page-subtitle" id="topPageSub"></div>
    <div class="filter-bar" id="topFilter"></div>
    <div class="top-list" id="topList"></div>

// Titles that should NOT match (wrong posters)
const TITLE_BLOCK=["김부장","김 부장"];

async function tmdbSearch(q,t,l){
  try{
    const r=await fetch(`https://api.themoviedb.org/3/search/${t}?api_key=${TMDB_API}&query=${encodeURIComponent(q)}&language=${l}&include_adult=false`);
    if(!r.ok)return null;const d=await r.json();
    if(d.results?.length){for(const x of d.results){if(x.poster_path)return TMDB_IMG+x.poster_path;}}
  }catch(e){}return null;
}

async function fetchPoster(title,type){
  if(!title)return null;
  const key=title+"|"+type;
  if(posterCache[key]!==undefined)return posterCache[key];
  // Block known bad matches
  if(TITLE_BLOCK.some(b=>title.includes(b))){posterCache[key]=null;return null;}
  const st=(type==="드라마"||type==="예능")?"tv":"movie";
  let url=await tmdbSearch(title,st,"ko-KR");
  if(!url&&TITLE_MAP[title])url=await tmdbSearch(TITLE_MAP[title],st,"en-US");
  if(!url)url=await tmdbSearch(title,st,"en-US");
  if(!url){const alt=st==="movie"?"tv":"movie";url=await tmdbSearch(title,alt,"ko-KR");if(!url&&TITLE_MAP[title])url=await tmdbSearch(TITLE_MAP[title],alt,"en-US");}
  posterCache[key]=url;return url;
}

function genrePlaceholder(genre,type){
  const m={"코미디":"#FDE68A","액션":"#FCA5A5","SF":"#A5B4FC","드라마":"#93C5FD","로맨스":"#FCA5A5","애니메이션":"#A7F3D0",
    "공포":"#1E293B","스릴러":"#475569","뮤지컬":"#FCD34D","전시":"#C4B5FD","스포츠":"#6EE7B7","게임":"#34D399","축구":"#6EE7B7"};
  const g=((genre||type||"")+"").split("/")[0].split(",")[0];
  for(const[k,v]of Object.entries(m)){if(g.includes(k))return v;}return"#CBD5E1";
}

// ── Sort helper ──
function sortItems(items, sortBy){
  const arr=[...items];
  if(sortBy==="score") arr.sort((a,b)=>(Number(b['총점'])||0)-(Number(a['총점'])||0));
  else arr.sort((a,b)=>{
    const da=a['공개일']||'9999',db=b['공개일']||'9999';
    return da<db?-1:da>db?1:0;
  });
  return arr;
}

// ── Navigate ──
function navigate(key,skipHistory){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("show"));
  document.querySelectorAll(".sb-item").forEach(el=>el.classList.remove("active"));
  document.querySelector(`.sb-item[data-key="${key}"]`)?.classList.add("active");
  if(key==="dashboard"){document.getElementById("homePage").classList.add("show");}
  else if(CATS.includes(key)){curCatSort="score";showCatPage(key);}
  else if(key==="keywords"){showKwPage();}
  else if(key==="top"){curTopFilter="all";showTopPage();}
  if(!skipHistory)history.pushState({page:key},'',"#"+key);
  window.scrollTo(0,0);
}
window.addEventListener("popstate",function(e){
  const key=e.state?e.state.page:(location.hash?location.hash.slice(1):"dashboard");
  navigate(key,true);
});

async function loadPosters(){
  const els=[...document.querySelectorAll(".cl-poster[data-title]")];
  for(let i=0;i<els.length;i+=6){
    const batch=els.slice(i,i+6);
    await Promise.all(batch.map(async(el)=>{
      const title=el.dataset.title,type=el.dataset.type;if(!title)return;
      const url=await fetchPoster(title,type);
      if(url){const img=document.createElement("img");img.src=url;img.alt=title;
        img.onload=()=>{const ph=el.querySelector(".poster-placeholder");if(ph)ph.style.display="none";el.insertBefore(img,el.firstChild);};
      }else{const ph=el.querySelector(".poster-placeholder");if(ph){const g=genrePlaceholder(null,type);el.style.background=`linear-gradient(135deg,${g}40,${g}20)`;}}
    }));
  }
}

  rawCats.forEach(c=>{if(!orderedCats.find(o=>o.key===c))orderedCats.push({key:c,display:c});});
  let fh=`<span class="filter-label">카테고리:</span><button class="filter-btn ${curTopFilter==='all'?'active':''}" onclick="setTopFilter('all')">전체</button>`;
  orderedCats.forEach(c=>{fh+=`<button class="filter-btn ${curTopFilter===c.key?'active':''}" onclick="setTopFilter('${c.key}')">${c.display}</button>`;});
  document.getElementById("topFilter").innerHTML=fh;
  renderTopList();
  document.getElementById("topPage").classList.add("show");
}

function setTopFilter(f){curTopFilter=f;renderTopList();}

function renderTopList(){
  const tops=M()["작품성추천TOP"]||[];
  const sorted=[...(curTopFilter==="all"?tops:tops.filter(t=>(t['카테고리']||'')===curTopFilter))].sort((a,b)=>(Number(b['총점'])||0)-(Number(a['총점'])||0));
  const sc=(v)=>{v=Number(v);return v>=4?'color:var(--green)':v>=3?'color:var(--amber)':'color:var(--red)';};
  let h="",rank=0;
  sorted.forEach((t,i)=>{
    rank=i+1;
    const rankClass=rank==1?'gold':rank==2?'silver':rank==3?'bronze':'normal';
    const scoreColor=Number(t['총점'])>=17?'var(--green)':Number(t['총점'])>=14?'var(--blue)':'var(--slate-400)';
    const origIdx=tops.indexOf(t);
    h+=`<div class="top-card" onclick="showTopDetailIdx(${origIdx})">
      <div class="tc-rank ${rankClass}">${rank}</div>
      <div class="tc-poster" data-title="${(t['제목']||'').replace(/"/g,'&quot;')}" data-type="${t['유형']||''}"><span style="color:var(--slate-300);font-size:20px">🎬</span></div>
      <div class="tc-info"><div class="tc-title">${t['제목']||''}</div><div class="tc-sub">${t['카테고리']||''} · ${t['유형']||''} · ${t['공개일']||''}</div>
        <div class="tc-scores-row">
          <span class="tc-sc" style="${sc(t['화제성'])}">🔥 화제성 ${t['화제성']||'-'}</span>
          <span class="tc-sc" style="${sc(t['독창성'])}">💡 독창성 ${t['독창성']||'-'}</span>
          <span class="tc-sc" style="${sc(t['근접성'])}">🎯 근접성 ${t['근접성']||'-'}</span>
          <span class="tc-sc" style="${sc(t['영향성'])}">📈 영향성 ${t['영향성']||'-'}</span>
        </div>
      </div>
      <div class="tc-total"><div class="tc-total-label">SCORE</div><div class="tc-score-ring" style="background:${scoreColor}15;border:2px solid ${scoreColor}"><div class="tc-total-score" style="color:${scoreColor}">${t['총점']||'-'}</div></div><div class="tc-total-max">/ 20</div></div>
    </div>`;
  });
  document.getElementById("topList").innerHTML=h;
  setTimeout(async()=>{
    const els=document.querySelectorAll(".tc-poster[data-title]");
    for(const el of els){const url=await fetchPoster(el.dataset.title,el.dataset.type);if(url){const img=document.createElement("img");img.src=url;el.innerHTML="";el.appendChild(img);}}
  },100);
}

// ── Detail overlay (description BEFORE scores) ──
function scoreClass(v){v=Number(v);return v>=4?'high':v>=3?'mid':'low';}
function showDetail(catKey,idx){const cat=M()[catKey],it=cat.items[idx];renderDetail(it,`${cat.meta.icon} ${cat.meta.label}`);}
function showTopDetailIdx(idx){const t=M()["작품성추천TOP"][idx];renderDetail(t,`⭐ TOP Picks #${t['순위']||idx+1}`);}

async function renderDetail(it,catLabel){
  const p=document.getElementById("dp");
  const posterUrl=await fetchPoster(it['제목'],it['유형']);
  const barW=(v)=>Number(v)*20;
  const barC=(v)=>SCORE_COLORS[Number(v)]||'#CBD5E1';

  p.innerHTML=`
    <div class="dp-layout">
      <div class="dp-poster-side">
        ${posterUrl?`<img src="${posterUrl}" alt="">`:`<div class="dp-poster-placeholder"><span style="font-size:64px;opacity:.3">🎬</span></div>`}
      </div>
      <div class="dp-content-side">
        <div class="dp-header">
          <div class="dp-cat-label">${catLabel}</div>
          <h2>${it['제목']||''}</h2>
        </div>
        <div class="dp-meta-row">
          ${it['유형']?`<span class="dp-meta-tag">📌 ${it['유형']}</span>`:''}
          ${it['장르']?`<span class="dp-meta-tag">🎭 ${it['장르']}</span>`:''}
          ${it['공개일']?`<span class="dp-meta-tag">📅 ${it['공개일']}</span>`:''}
          ${it['플랫폼']?`<span class="dp-meta-tag">📺 ${it['플랫폼']}</span>`:''}
          ${it['감독/연출']?`<span class="dp-meta-tag">🎬 ${it['감독/연출']}</span>`:''}
          ${it['출연진']?`<span class="dp-meta-tag">👥 ${it['출연진']}</span>`:''}
        </div>
        <div class="dp-body">
      ${it['설명']?`<div class="dp-desc">${it['설명']}</div>`:''}
      ${it['평가근거']?`<div class="dp-reason"><strong>AI 평가 · </strong>${it['평가근거']}</div>`:''}

      <div class="dp-score-wrapper">
        <div class="dp-score-section">
          <h3>📊 LIFEPLUS 4대 평가</h3>
          <div class="dp-score-row"><span class="sr-icon">🔥</span><span class="sr-label">화제성</span><div class="sr-track"><div class="sr-fill" style="width:${barW(it['화제성'])}%;background:${barC(it['화제성'])}"></div></div><span class="sr-val" style="color:${barC(it['화제성'])}">${it['화제성']||'-'}</span></div>
          <div class="dp-score-row"><span class="sr-icon">💡</span><span class="sr-label">독창성</span><div class="sr-track"><div class="sr-fill" style="width:${barW(it['독창성'])}%;background:${barC(it['독창성'])}"></div></div><span class="sr-val" style="color:${barC(it['독창성'])}">${it['독창성']||'-'}</span></div>
          <div class="dp-score-row"><span class="sr-icon">🎯</span><span class="sr-label">근접성</span><div class="sr-track"><div class="sr-fill" style="width:${barW(it['근접성'])}%;background:${barC(it['근접성'])}"></div></div><span class="sr-val" style="color:${barC(it['근접성'])}">${it['근접성']||'-'}</span></div>
          <div class="dp-score-row"><span class="sr-icon">📈</span><span class="sr-label">영향성</span><div class="sr-track"><div class="sr-fill" style="width:${barW(it['영향성'])}%;background:${barC(it['영향성'])}"></div></div><span class="sr-val" style="color:${barC(it['영향성'])}">${it['영향성']||'-'}</span></div>
        </div>
        <div class="dp-total-panel"><div><div class="dtl">LIFEPLUS Score</div><div class="dtv">${it['총점']||'-'}</div><div class="dts">/ 20점 만점</div></div></div>
      </div>
      ${it['키워드']?`<div class="dp-tags">${it['키워드'].split(',').map(k=>`<span class="dp-tag">${k.trim()}</span>`).join('')}</div>`:''}
    </div>`;
  document.getElementById("overlay").classList.add("show");
}

function closeDetail(e){if(e&&e.target!==e.currentTarget)return;document.getElementById("overlay").classList.remove("show");}
function changeMonth(m){
  // Capture active tab BEFORE re-rendering sidebar
  const activeSb=document.querySelector(".sb-item.active");
  const activeKey=activeSb?activeSb.dataset.key:"dashboard";
  curMonth=m;renderSidebar();renderHome();
  // Re-navigate to the same tab
  if(CATS.includes(activeKey)){navigate(activeKey);}
  else if(activeKey==="keywords"){navigate("keywords");}
  else if(activeKey==="top"){navigate("top");}
  else{navigate("dashboard");}
}

renderSidebar();renderHome();
const initHash=location.hash?location.hash.slice(1):"dashboard";
if(initHash!=="dashboard")navigate(initHash,true);
else history.replaceState({page:"dashboard"},'',"#dashboard");
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeDetail();});
</script>
</body>
</html>
